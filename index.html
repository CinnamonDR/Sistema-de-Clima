<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Weather Pro</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container d-flex flex-column align-items-center justify-content-center min-vh-100">
        
        <!-- Buscador con Autocompletado -->
        <div class="search-box mb-5">
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-search text-info"></i></span>
                <input type="text" id="cityInput" class="form-control" placeholder="Escribe una ciudad..." autocomplete="off">
                <button class="btn" id="clearBtn" title="Cerrar">
                    <i class="bi bi-x-lg text-info"></i>
                </button>
            </div>
            <!-- Lista de sugerencias (Predicción) -->
            <ul id="suggestions" class="list-group"></ul>
        </div>

        <!-- Mensaje de estado -->
        <div id="statusMessage" class="text-center">
            <p class="text-info opacity-50">Busca una ciudad para ver el clima...</p>
        </div>

        <!-- Contenedor Principal de Clima -->
        <div id="weatherResult" class="weather-card-container d-none">
            <div class="main-card text-center mb-5">
                <h1 id="cityName" class="display-4 fw-bold">---</h1>
                <p id="dateText" class="text-info opacity-75">---</p>
                
                <div class="d-flex align-items-center justify-content-center flex-wrap">
                    <div id="weatherIcon" class="me-3"></div>
                    <div>
                        <h2 id="tempMain" class="temp-display">0°C</h2>
                        <p id="description" class="text-uppercase tracking-widest h4">---</p>
                    </div>
                </div>
            </div>

            <!-- Tarjetas de Datos Secundarios -->
            <div class="row g-4 justify-content-center">
                <div class="col-6 col-md-3">
                    <div class="data-card">
                        <i class="bi bi-droplets-fill mb-2"></i>
                        <span>Humedad</span>
                        <h4 id="humidityText">0%</h4>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="data-card">
                        <i class="bi bi-wind mb-2"></i>
                        <span>Viento</span>
                        <h4 id="windText">0 km/h</h4>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="data-card">
                        <i class="bi bi-thermometer-half mb-2"></i>
                        <span>Sensación</span>
                        <h4 id="feelsLikeText">0°C</h4>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="data-card">
                        <i class="bi bi-brightness-high-fill mb-2"></i>
                        <span>Índice UV</span>
                        <h4 id="uvText">0</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
